name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Python lint (Ruff + Black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff==0.15.20 black==26.5.1

      - name: Ruff check
        run: ruff check .

      - name: Black check
        run: black --check .

  lint-frontend:
    name: Frontend lint + typecheck (ESLint + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Unit tests
        run: npm run test
        working-directory: frontend
