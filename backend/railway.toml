# DEPRECATED for deploy — use the repo-root `railway.toml` instead.
#
# Do NOT set Railway Root Directory to `backend/`. Passport routes import
# `autoria_ai` from the sibling `ai_pipeline/` package; that only exists when
# the service Root Directory is the monorepo root (empty).
#
# Kept here so old dashboard links still point at an explanation.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
